<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TagSnap">
<title>TagSnap – Shoe Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    padding: 52px 24px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }

  .api-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .api-btn.set { border-color: var(--accent); color: var(--accent); }

  main {
    flex: 1;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .camera-zone {
    position: relative;
    border: 2px dashed var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--surface);
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .camera-zone.has-image { border-style: solid; border-color: var(--accent); }

  .camera-zone img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .camera-zone.has-image img { display: block; }

  .camera-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
  }
  .camera-zone.has-image .camera-placeholder { display: none; }

  .shoe-icon { font-size: 48px; filter: grayscale(1) opacity(0.4); }

  .camera-placeholder p {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .scan-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.15s;
  }
  .scan-btn:active { transform: scale(0.97); }

  #fileInput { display: none; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: none;
  }
  .result-card.visible { display: block; animation: slideUp 0.3s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    background: #1a1a1a;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .result-header .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    flex: 1;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .result-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  .ai-analysis {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 12px;
  }

  .brand-badge {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }

  .style-code-input-row {
    display: flex;
    gap: 8px;
  }

  .style-code-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.2s;
  }
  .style-code-input:focus { border-color: var(--accent); }

  .clear-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    padding: 0 14px;
    font-size: 18px;
    cursor: pointer;
  }

  .candidates-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }

  .candidates-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 100%;
  }

  .candidate-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .candidate-chip:active,
  .candidate-chip.selected { background: var(--accent); color: #000; border-color: var(--accent); }

  .ebay-btn {
    width: 100%;
    background: linear-gradient(135deg, #e53238, #0064d2);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .ebay-btn:active { transform: scale(0.97); }

  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    backdrop-filter: blur(4px);
  }
  .loading-overlay.active { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: flex-end;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 48px;
    width: 100%;
    animation: slideUp 0.3s ease;
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    color: var(--accent);
  }

  .modal p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .modal p a { color: var(--accent); text-decoration: none; }

  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .modal input:focus { border-color: var(--accent); }

  .modal-save {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
  }

  .modal-cancel {
    width: 100%;
    background: none;
    border: none;
    color: var(--muted);
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 4px;
  }

  .error-msg {
    background: #1a0a0a;
    border: 1px solid #3a1a1a;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: #ff8888;
    font-family: 'DM Mono', monospace;
    display: none;
  }
  .error-msg.show { display: block; }

  .footer-hint {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Tag<span>Snap</span></div>
  <button class="api-btn" id="apiBtn" onclick="openModal()">⚙ API KEY</button>
</header>

<main>
  <div class="camera-zone" id="cameraZone" onclick="triggerCamera()">
    <div class="camera-placeholder">
      <div class="shoe-icon">👟</div>
      <p>Tap to photograph tag</p>
    </div>
    <img id="preview" src="" alt="Tag preview">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p>Reading tag...</p>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handleImage(event)">

  <button class="scan-btn" onclick="triggerCamera()">📸 SCAN SHOE TAG</button>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="label">AI Analysis</span>
      <div class="status-dot"></div>
    </div>
    <div class="result-body">

      <div>
        <div id="brandBadge" class="brand-badge" style="display:none"></div>
        <div class="ai-analysis" id="aiAnalysis"></div>
      </div>

      <div>
        <span class="field-label">Style / Model Code — confirm or edit</span>
        <div class="style-code-input-row">
          <input type="text" class="style-code-input" id="styleCode" placeholder="e.g. CZ5594-100" autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="clear-btn" onclick="clearCode()">✕</button>
        </div>
        <div class="candidates-row" id="candidatesRow" style="display:none">
          <span class="candidates-label">Other codes found — tap to use:</span>
          <div id="candidateChips"></div>
        </div>
      </div>

      <button class="ebay-btn" onclick="searchEbay()">🔍 SEARCH EBAY SOLD</button>

      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>
</main>

<div class="footer-hint">add to home screen for app experience</div>

<div class="modal-bg" id="modalBg" onclick="closeModalBg(event)">
  <div class="modal">
    <h2>API Key Setup</h2>
    <p>Enter your Anthropic API key from <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. Stored only on this device.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    <button class="modal-save" onclick="saveKey()">SAVE KEY</button>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
  let currentImageB64 = null;

  function getKey() { return localStorage.getItem('anthropic_key') || ''; }

  function saveKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val.startsWith('sk-')) { alert('That doesn\'t look like a valid API key.'); return; }
    localStorage.setItem('anthropic_key', val);
    document.getElementById('apiBtn').classList.add('set');
    document.getElementById('apiBtn').textContent = '✓ API SET';
    closeModal();
  }

  function openModal() {
    document.getElementById('apiKeyInput').value = getKey();
    document.getElementById('modalBg').classList.add('open');
  }
  function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
  function closeModalBg(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }

  function triggerCamera() {
    if (!getKey()) { openModal(); return; }
    document.getElementById('fileInput').click();
  }

  function handleImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      currentImageB64 = dataUrl.split(',')[1];
      document.getElementById('preview').src = dataUrl;
      document.getElementById('cameraZone').classList.add('has-image');
      analyzeTag();
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  async function analyzeTag() {
    const overlay = document.getElementById('loadingOverlay');
    const resultCard = document.getElementById('resultCard');
    const errorMsg = document.getElementById('errorMsg');

    overlay.classList.add('active');
    resultCard.classList.remove('visible');
    errorMsg.classList.remove('show');
    document.getElementById('candidatesRow').style.display = 'none';
    document.getElementById('brandBadge').style.display = 'none';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': getKey(),
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 600,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: { type: 'base64', media_type: 'image/jpeg', data: currentImageB64 }
              },
              {
                type: 'text',
                text: `You are helping an eBay shoe reseller find the style code on a shoe tag. This code is what they'll search on eBay sold listings.

BRAND-SPECIFIC PATTERNS — memorize these:

NIKE:
- Format: 2 letters + 4 digits + dash + 3 digits: CZ5594-100, DZ5485-612, FD2596-001, BQ6472-101
- Less common: 6 digits + dash + 3 digits: 544331-001, 302370-161
- The last 3 digits after the dash are the colorway code
- Usually printed near or below a barcode

ADIDAS:
- Format: 2-3 letters + 4 digits: JS4945, GW3811, HQ4272, GX5794, EG2441
- Almost always exactly 6 characters total
- Sometimes starts with 3 letters

NEW BALANCE:
- Format: letter + 3-4 digits + letters: M990GL6, U9060EGB

OTHER BRANDS: Look for codes labeled "Style No.", "Art. No.", "SKU", "Item", or near a barcode.

IMPORTANT TIPS:
- Tags often have MANY numbers (size, width, barcode number, country code) — don't confuse these with the style code
- The style code is usually the most prominent alphanumeric code on the tag
- Barcode numbers (long strings of 10-13 digits) are NOT style codes
- Size numbers (8, 9, 10, 10.5 etc) are NOT style codes

Scan the entire tag. Find ALL possible style codes. Return your best guess plus alternatives.

Respond ONLY with raw JSON, no markdown:
{
  "style_code": "best match style code",
  "candidates": ["other_code_1", "other_code_2"],
  "brand": "Nike or Adidas or New Balance or Unknown",
  "analysis": "One sentence: what you see and why you picked this code."
}`
              }
            ]
          }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const text = data.content[0].text.trim();

      let parsed;
      try {
        const match = text.match(/\{[\s\S]*\}/);
        parsed = JSON.parse(match ? match[0] : text);
      } catch {
        throw new Error('Could not read AI response. Try again.');
      }

      // Populate result card
      document.getElementById('aiAnalysis').textContent = parsed.analysis || '';
      document.getElementById('styleCode').value = parsed.style_code || '';

      // Brand badge
      if (parsed.brand && parsed.brand !== 'Unknown') {
        const badge = document.getElementById('brandBadge');
        badge.textContent = parsed.brand;
        badge.style.display = 'inline-block';
      }

      // Candidate chips — filter out the main code and blanks
      const candidates = (parsed.candidates || []).filter(c => c && c !== parsed.style_code);
      if (candidates.length > 0) {
        const chipsEl = document.getElementById('candidateChips');
        chipsEl.innerHTML = '';
        candidates.forEach(code => {
          const chip = document.createElement('button');
          chip.className = 'candidate-chip';
          chip.textContent = code;
          chip.onclick = () => {
            document.getElementById('styleCode').value = code;
            document.querySelectorAll('.candidate-chip').forEach(c => c.classList.remove('selected'));
            chip.classList.add('selected');
          };
          chipsEl.appendChild(chip);
        });
        document.getElementById('candidatesRow').style.display = 'flex';
      }

      resultCard.classList.add('visible');

    } catch (err) {
      console.error(err);
      document.getElementById('errorMsg').textContent = `Error: ${err.message}`;
      document.getElementById('errorMsg').classList.add('show');
      document.getElementById('aiAnalysis').textContent = 'Could not analyze tag.';
      resultCard.classList.add('visible');
    } finally {
      overlay.classList.remove('active');
    }
  }

  function searchEbay() {
    const code = document.getElementById('styleCode').value.trim();
    if (!code) { alert('Please enter or confirm the style code first.'); return; }
    const url = `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(code)}&LH_Sold=1&LH_Complete=1&_sop=13`;
    window.open(url, '_blank');
  }

  function clearCode() {
    document.getElementById('styleCode').value = '';
    document.querySelectorAll('.candidate-chip').forEach(c => c.classList.remove('selected'));
    document.getElementById('styleCode').focus();
  }

  window.addEventListener('load', () => {
    if (getKey()) {
      document.getElementById('apiBtn').classList.add('set');
      document.getElementById('apiBtn').textContent = '✓ API SET';
    }
  });
</script>
</body>
</html>
